services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  managementtool:
    build:
      context: apps/managementtool
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ONENECE_CLIENT_ID: ${ONENECE_CLIENT_ID:-}
      ONENECE_CLIENT_SECRET: ${ONENECE_CLIENT_SECRET:-}
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  scheduler:
    build:
      context: apps/managementtool
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ONENECE_CLIENT_ID: ${ONENECE_CLIENT_ID:-}
      ONENECE_CLIENT_SECRET: ${ONENECE_CLIENT_SECRET:-}
    depends_on:
      mariadb:
        condition: service_healthy
    command: python manage.py scheduler

  coap:
    build:
      context: apps/coap
    restart: unless-stopped
    environment:
      DJANGO_HOST: managementtool
      DJANGO_PORT: ${APP_PORT}
    ports:
      - "${COAP_PORT}:5683/udp"
    depends_on:
      - managementtool

  device_simulator:
    build:
      context: apps/device_simulator
    restart: unless-stopped
    depends_on:
      - coap
    profiles:
      - simulate

volumes:
  mariadb_data:
